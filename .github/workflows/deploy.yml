name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 49229
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # 1. Исправление проблем с APT (удаляем битый репозиторий nginx, если он мешает)
            sudo rm -f /etc/apt/sources.list.d/nginx.list || true
            sudo apt-get update -y || true
            
            # 2. Инсталляция Git, если его нет
            if ! command -v git &> /dev/null; then
              echo "📦 Установка Git..."
              sudo apt-get install -y git
            fi
            
            # 3. Клонирование репозитория, если папки нет
            if [ ! -d "telegram-shop" ]; then
              echo "🔄 Клонирование репозитория..."
              git clone https://github.com/GiornoGiovanaJoJo/telegram-shop.git
            fi
            
            cd telegram-shop
            git pull origin main
            
            # 4. Установка Node.js и PM2 через наш скрипт, если они отсутствуют
            if ! command -v node &> /dev/null || ! command -v pm2 &> /dev/null; then
              echo "⚙️  Запуск первичной настройки сервера..."
              chmod +x vps-deploy/setup.sh
              ./vps-deploy/setup.sh
            fi
            
            # 5. Настройка Nginx (автоматическая привязка конфига)
            echo "⚙️  Обновление конфигурации Nginx..."
            sudo cp vps-deploy/nginx.conf /etc/nginx/sites-available/telegram-shop
            sudo ln -sf /etc/nginx/sites-available/telegram-shop /etc/nginx/sites-enabled/
            
            # Удаляем все дефолтные конфиги, которые могут перехватывать трафик
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo rm -f /etc/nginx/conf.d/default.conf
            
            echo "🧪 Проверка конфигурации Nginx..."
            sudo nginx -t
            sudo systemctl restart nginx
            
            # Показать, какие сайты включены
            echo "📂 Активные конфигурации в sites-enabled:"
            ls -l /etc/nginx/sites-enabled/
            
            # 6. Финальный запуск
            echo "▶️  Запуск приложения..."
            npm install --production
            pm2 restart telegram-shop || pm2 start pm2.config.js
            pm2 save
            
            echo "✅ Статус приложения в PM2:"
            pm2 status telegram-shop
